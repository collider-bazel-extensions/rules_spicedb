name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  analysis:
    name: bazel test (ubuntu-latest, analysis)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-analysis
          repository-cache: true

      # The system-mode `spicedb` toolchain looks for spicedb + zed
      # on $PATH. Install both so analysis of the pre-existing
      # test-time targets passes. Versions match `spicedb.system(versions
      # = ["1.30"])` in MODULE.bazel — bump in lockstep.
      - name: Install spicedb + zed binaries
        run: |
          set -euo pipefail
          curl -sSfL "https://github.com/authzed/spicedb/releases/download/v1.30.1/spicedb_1.30.1_linux_amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin spicedb
          curl -sSfL "https://github.com/authzed/zed/releases/download/v0.36.1/zed_0.36.1_linux_amd64_gnu.tar.gz" \
            | sudo tar -xz -C /usr/local/bin zed
          sudo chmod +x /usr/local/bin/spicedb /usr/local/bin/zed
          spicedb version
          zed version

      # `bazel build //...` analyzes ALL platforms' spicedb_binary_files
      # targets, including darwin_arm64 / darwin_amd64 which can't be
      # populated on a linux runner (the system extension symlinks the
      # host's spicedb, so cross-platform repos stay empty and
      # `_require("spicedb")` fails). Build targeted paths instead.
      - name: bazel build (linux targets only)
        run: |
          bazel build \
            //:spicedb_1_30 \
            //tests:test_server \
            //tests:test_server_health \
            //tests/install_smoke:smoke_test

      - name: bazel test (analysis only)
        run: bazel test //... --test_tag_filters=-manual --test_output=errors

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bazel-testlogs-analysis
          path: bazel-testlogs/
          if-no-files-found: ignore

  install_smoke:
    # End-to-end install smoke: kind + spicedb-operator install +
    # SpiceDBCluster reconciliation + zed schema write + permission
    # check (positive + negative).
    name: install smoke (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-install-smoke
          repository-cache: true

      # The smoke needs zed on the runner: it port-forwards the
      # in-cluster SpiceDB Service to localhost and drives schema
      # writes + permission checks via zed CLI. (kubectl-exec'ing
      # a zed pod fails because authzed/zed:latest is a from-scratch
      # image without /bin/sh — kubectl run --command -- sleep 600
      # has nothing to run.)
      - name: Install zed CLI
        run: |
          set -euo pipefail
          curl -sSfL "https://github.com/authzed/zed/releases/download/v0.36.1/zed_0.36.1_linux_amd64_gnu.tar.gz" \
            | sudo tar -xz -C /usr/local/bin zed
          sudo chmod +x /usr/local/bin/zed
          zed version

      - name: Verify Docker is available
        run: docker version

      - name: bazel test //tests/install_smoke:smoke_test
        # kind boot (~30s) + operator image pull (~50 MB) +
        # SpiceDBCluster reconciliation + memory-backed pod startup +
        # zed pod (~50 MB) + schema write + permission checks.
        run: bazel test //tests/install_smoke:smoke_test --test_output=streamed --test_timeout=900

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bazel-testlogs-install-smoke
          path: bazel-testlogs/
          if-no-files-found: ignore
