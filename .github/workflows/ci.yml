name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # Hermetic mode (spicedb.version) — runner has NO host spicedb or
  # zed installed. Proves the v0.3+ hermetic toolchain materializes
  # both binaries from authzed's GitHub releases via the pinned
  # sha256s in extensions.bzl. rules_spicedb's own MODULE.bazel uses
  # spicedb.version() so the full test matrix runs hermetically.
  analysis:
    name: bazel test (ubuntu-latest, hermetic spicedb.version)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-analysis
          repository-cache: true

      # Belt-and-suspenders: verify no host spicedb/zed are on PATH
      # at job start. If any are present, the hermetic test would
      # silently fall back to them and we'd lose the proof. (Mirror
      # of rules_pg v0.4's hermetic verification step.)
      - name: Verify NO host spicedb/zed on PATH
        run: |
          set -euo pipefail
          for bin in spicedb zed; do
            if command -v "$bin" >/dev/null 2>&1; then
              echo "FAIL: $bin found at $(command -v "$bin"); hermetic test would be meaningless" >&2
              exit 1
            fi
          done
          echo "OK — no host spicedb/zed; hermetic mode test is meaningful"

      # Cross-platform binary repos can't materialize on a linux
      # runner (the wrong-arch spicedb tarballs fail sha-check at
      # download time, even though they're never executed). Target
      # specific paths to avoid analyzing them. Same lesson rules_pg
      # / rules_temporal learned.
      - name: bazel build (linux targets only)
        run: |
          bazel build \
            //:spicedb_1_52 \
            //tests:test_server \
            //tests:test_server_health \
            //tests/install_smoke:smoke_test

      - name: bazel test (hermetic CLI primitives)
        run: |
          bazel test //tests/... \
              --test_tag_filters=-manual \
              --test_output=errors

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bazel-testlogs-analysis
          path: bazel-testlogs/
          if-no-files-found: ignore

  install_smoke:
    # End-to-end install smoke: kind + spicedb-operator install +
    # SpiceDBCluster reconciliation + zed schema write + permission
    # check (positive + negative).
    name: install smoke (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-install-smoke
          repository-cache: true

      # The smoke port-forwards the in-cluster SpiceDB Service to
      # localhost and drives schema writes + permission checks via
      # the host zed CLI. (kubectl-exec'ing a zed pod fails because
      # authzed/zed:latest is from-scratch and lacks /bin/sh —
      # kubectl run --command -- sleep 600 has nothing to run.)
      # Version matches the v0.3 pin so behavior stays consistent.
      - name: Install zed CLI
        run: |
          set -euo pipefail
          curl -sSfL "https://github.com/authzed/zed/releases/download/v1.1.1/zed_1.1.1_linux_amd64_gnu.tar.gz" \
            | sudo tar -xz -C /usr/local/bin zed
          sudo chmod +x /usr/local/bin/zed
          zed version

      - name: Verify Docker is available
        run: docker version

      - name: bazel test //tests/install_smoke:smoke_test
        run: bazel test //tests/install_smoke:smoke_test --test_output=streamed --test_timeout=900

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bazel-testlogs-install-smoke
          path: bazel-testlogs/
          if-no-files-found: ignore
